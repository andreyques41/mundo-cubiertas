services:
  postgres:
    image: postgres:16-alpine
    container_name: mundo-cubiertas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mundocubiertas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mundocubiertas_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mundo_cubiertas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
